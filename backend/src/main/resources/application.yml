spring:
  profiles:
    active: local

  datasource:
    url: jdbc:mysql://localhost:3306/smithlife?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: root
    password: ssafy
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  jackson:
    time-zone: Asia/Seoul

server:
  port: 8080

jwt:
  secret: smithlife-secret-key-must-be-at-least-256-bits-long-for-hs256
  access-token-expiration: 3600000       # 1시간 (ms)
  refresh-token-expiration: 604800000    # 7일 (ms)

logging:
  level:
    com.smithlife: DEBUG
    org.hibernate.SQL: DEBUG
