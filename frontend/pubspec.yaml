name: frontend
description: "SmithLife - 피트니스 센터 통합 관리 앱"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # 상태 관리
  flutter_riverpod: ^2.6.1

  # 네트워크
  dio: ^5.7.0

  # 라우팅
  go_router: ^14.6.2

  # 로컬 저장소 (JWT 토큰)
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.3

  # UI
  cupertino_icons: ^1.0.8
  cached_network_image: ^3.4.1
  qr_flutter: ^4.1.0

  # 폰트
  google_fonts: ^6.2.1

  # 유틸
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
  fonts:
    - family: Pretendard
      fonts:
        - asset: assets/fonts/Pretendard-Regular.ttf
          weight: 400
        - asset: assets/fonts/Pretendard-Medium.ttf
          weight: 500
        - asset: assets/fonts/Pretendard-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Pretendard-Bold.ttf
          weight: 700
        - asset: assets/fonts/Pretendard-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/Pretendard-Black.ttf
          weight: 900
